<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학교 업무 자동화 - 주간계획 뷰어</title>
  <style>
    /* 스프레드시트 원본 서식을 모바일에 그대로 반영하기 위한 스타일 디자인 */
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      margin: 0;
      padding: 12px;
      background-color: #f8f9fa;
      color: #000000;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* 상단 메뉴 컨트롤 바 */
    .menu-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 2px solid #222222;
      padding-bottom: 10px;
    }

    .nav-buttons {
      display: flex;
      gap: 4px;
    }

    .btn-nav {
      background-color: #ffffff;
      border: 1px solid #cccccc;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 4px;
    }

    .view-tabs {
      display: flex;
      gap: 2px;
    }

    .btn-tab {
      background-color: #e0e0e0;
      color: #333333;
      border: 1px solid #999999;
      padding: 8px 18px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-tab.active {
      background-color: #4CAF50;
      color: #ffffff;
      border-color: #4CAF50;
    }

    /* 메인 타이틀 정보 영역 */
    .title-area {
      text-align: center;
      margin-bottom: 15px;
    }
    .title-area h2 {
      margin: 0;
      font-size: 24px;
      font-weight: bold;
    }
    .title-area p {
      margin: 4px 0 0 0;
      font-size: 15px;
      font-weight: bold;
      color: #444444;
    }

    /* 표(Table) 가로 찌그러짐 방지 wrapper */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;
    }

    /* 캡처 화면 양식과 100% 일치하는 명확하고 굵은 테두리 표 */
    .plan-table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      font-size: 15px;
      min-width: 500px;
    }
    
    .plan-table th, .plan-table td {
      border: 1px solid #000000; /* 또렷하고 굵은 검은색 외곽선 */
      padding: 12px 6px;
    }
    
    /* 회색 음영 처리 컬럼 */
    .bg-gray-header {
      background-color: #e2e2e2;
      font-weight: bold;
    }
    
    /* 항목별 너비 고정 규격 */
    .col-item {
      width: 80px;
    }

    /* 데이터 대기 상태 창 */
    .loading-container {
      text-align: center;
      padding: 40px;
      font-weight: bold;
      font-size: 15px;
      color: #4CAF50;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="menu-bar">
      <div class="nav-buttons">
        <button class="btn-nav" id="btn-prev">◀</button>
        <button class="btn-nav" id="btn-today">오늘</button>
        <button class="btn-nav" id="btn-next">▶</button>
      </div>
      
      <div class="view-tabs">
        <button class="btn-tab" id="tab-month">월</button>
        <button class="btn-tab active" id="tab-week">주</button> <button class="btn-tab" id="tab-day">일</button>
      </div>
    </div>

    <div class="title-area">
      <h2 id="main-title">주간계획표</h2>
      <p id="sub-title">시트 연동 상태 확인 중...</p>
    </div>

    <div class="table-wrapper">
      <div id="status-loading" class="loading-container">구글 스프레드시트 데이터를 동기화하고 있습니다 ⏳</div>
      
      <table class="plan-table" id="view-matrix" style="display: none;">
        <thead>
          <tr>
            <th class="bg-gray-header col-item">구분</th>
            <th class="bg-gray-header">날짜/요일</th>
            <th class="bg-gray-header col-item">교시</th>
            <th class="bg-gray-header">학반</th>
            <th class="bg-gray-header">학사일정</th>
          </tr>
        </thead>
        <tbody id="view-tbody">
          </tbody>
      </table>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
