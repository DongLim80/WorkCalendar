<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학교 주간계획표 시스템</title>
  <style>
    /* 교무실 주간계획 레이아웃을 위한 커스텀 스타일 */
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      margin: 0;
      padding: 15px;
      background-color: #f8f9fa;
      color: #000000;
    }
    
    .container {
      max-width: 950px;
      margin: 0 auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    /* 상단 월/주/일 제어 메뉴 */
    .menu-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #333;
      padding-bottom: 12px;
    }

    .nav-buttons {
      display: flex;
      gap: 5px;
    }

    .btn-nav {
      background-color: #ffffff;
      border: 1px solid #cccccc;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 4px;
    }

    .view-tabs {
      display: flex;
      gap: 2px;
    }

    .btn-tab {
      background-color: #e0e0e0;
      color: #333333;
      border: 1px solid #999999;
      padding: 8px 20px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-tab.active {
      background-color: #4CAF50;
      color: #ffffff;
      border-color: #4CAF50;
    }

    /* 제목 및 주차 표시 영역 */
    .title-area {
      text-align: center;
      margin-bottom: 20px;
    }
    .title-area h2 {
      margin: 0;
      font-size: 26px;
      font-weight: bold;
    }
    .title-area p {
      margin: 6px 0 0 0;
      font-size: 16px;
      font-weight: bold;
      color: #555555;
    }

    /* 가로 스크롤 대응 wrapper */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;
    }

    /* 학교 배포 규격용 또렷한 테두리 표(Table) */
    .week-table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      font-size: 15px;
      min-width: 650px; /* 모바일에서 자물쇠 격자가 깨지지 않도록 방어 */
    }
    
    .week-table th, .week-table td {
      border: 1px solid #111111; /* 선명하고 또렷한 테두리 검은 선 */
      padding: 14px 8px;
    }
    
    /* 회색 음영 처리 (교시 및 날짜 헤더) */
    .bg-header {
      background-color: #f2f2f2;
      font-weight: bold;
    }
    
    .col-period {
      width: 80px;
    }

    /* 로딩 알림 창 */
    .loading-status {
      text-align: center;
      padding: 30px;
      font-weight: bold;
      font-size: 16px;
      color: #4CAF50;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="menu-bar">
      <div class="nav-buttons">
        <button class="btn-nav" id="btn-prev">◀</button>
        <button class="btn-nav" id="btn-today">오늘</button>
        <button class="btn-nav" id="btn-next">▶</button>
      </div>
      
      <div class="view-tabs">
        <button class="btn-tab" id="tab-month">월</button>
        <button class="btn-tab active" id="tab-week">주</button> <button class="btn-tab" id="tab-day">일</button>
      </div>
    </div>

    <div class="title-area">
      <h2 id="main-title">주간계획표</h2>
      <p id="sub-title">기간 정보 로딩 중...</p>
    </div>

    <div class="table-wrapper">
      <div id="status-message" class="loading-status">구글 스프레드시트 서버와 연결 중입니다... ⏳</div>
      
      <table class="week-table" id="data-table" style="display: none;">
        <thead>
          <tr id="table-head-row">
            </tr>
        </thead>
        <tbody id="table-body-area">
          </tbody>
      </table>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
