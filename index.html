<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>학교 모바일 주간계획표</title>
  <style>
    /* 전체 레이아웃 및 모바일 최적화 */
    body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 10px; background-color: #f4f6f8; color: #111; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    
    /* 상단 컨트롤러 (월/주/일, 이동 버튼) */
    .menu-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 8px; }
    .nav-buttons button, .view-tabs button { background: #fff; border: 1px solid #ccc; padding: 6px 12px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 13px; }
    .view-tabs button.active { background-color: #4CAF50; color: #fff; border-color: #4CAF50; }
    
    /* 타이틀 */
    .title-area { text-align: center; margin-bottom: 12px; }
    .title-area h2 { margin: 0; font-size: 20px; font-weight: 800; }
    
    /* 표(Table) 가로 스크롤 및 너비 최적화 */
    .table-wrapper { width: 100%; overflow-x: auto; }
    .plan-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; min-width: 600px; }
    .plan-table th, .plan-table td { border: 1px solid #000; padding: 4px; font-size: 12px; word-break: keep-all; vertical-align: middle; }
    .bg-gray-header { background-color: #e2e2e2; font-weight: bold; }
    
    /* 컬럼 너비 최적화 */
    .col-day { width: 35px; }   /* 구분(월,화) */
    .col-date { width: 50px; }  /* 날짜 */
    .col-period { width: 40px;} /* 교시 */
    .col-class { width: 50px;}  /* 학반 */
    .col-schedule { width: auto; text-align: left; vertical-align: top; padding: 6px; line-height: 1.4; } /* 일정 */
    .col-memo { width: 30%; }   /* 메모 */

    /* 학반 강조 및 메모 텍스트 박스 */
    .class-box { background-color: #e8f5e9; padding: 3px; border-radius: 4px; font-weight: bold; color: #1b5e20; display: inline-block; }
    .memo-input { width: 100%; height: 90px; border: none; resize: none; font-family: inherit; font-size: 12px; box-sizing: border-box; background: transparent; outline: none; }
    .memo-input:focus { background-color: #fff9c4; border: 1px dashed #fbc02d; }

    /* 월간 달력(Grid) UI */
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #bbb; border: 1px solid #bbb; }
    .cal-header { background: #f2f2f2; text-align: center; font-weight: bold; padding: 6px 0; font-size: 12px; }
    .cal-cell { background: #fff; min-height: 70px; padding: 4px; display: flex; flex-direction: column; }
    .cal-cell.empty { background: #f9f9f9; }
    .cal-date { font-size: 12px; font-weight: bold; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .cal-evt { font-size: 10px; background: #e8f5e9; color: #1b5e20; margin-bottom: 2px; padding: 2px 4px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .loading-container { text-align: center; padding: 30px; font-weight: bold; color: #4CAF50; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 컨트롤 패널 -->
    <div class="menu-bar">
      <div class="nav-buttons">
        <button id="btn-prev">◀</button>
        <button id="btn-today">오늘</button>
        <button id="btn-next">▶</button>
      </div>
      <div class="view-tabs">
        <button class="btn-tab" id="tab-month">월</button>
        <button class="btn-tab active" id="tab-week">주</button>
        <button class="btn-tab" id="tab-day">일</button>
      </div>
    </div>

    <!-- 타이틀 -->
    <div class="title-area">
      <h2 id="main-title">로딩 중...</h2>
    </div>

    <!-- 데이터 출력 영역 -->
    <div id="status-loading" class="loading-container">데이터 동기화 중... ⏳</div>
    
    <!-- 1. 월간 달력 뷰 -->
    <div id="view-month" style="display: none;"></div>

    <!-- 2. 주간 & 일간 공통 테이블 뷰 -->
    <div id="view-table-wrapper" class="table-wrapper" style="display: none;">
      <table class="plan-table">
        <thead>
          <tr>
            <th class="bg-gray-header col-day">구분</th>
            <th class="bg-gray-header col-date">날짜</th>
            <th class="bg-gray-header col-period">교시</th>
            <th class="bg-gray-header col-class">학반</th>
            <th class="bg-gray-header col-schedule">일정</th>
            <th class="bg-gray-header col-memo">메모 (자동저장)</th>
          </tr>
        </thead>
        <tbody id="view-tbody">
          <!-- 스크립트가 조립하여 삽입 -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
